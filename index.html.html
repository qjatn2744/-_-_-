<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#4f46e5">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>달꿈 Edu-Match</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #e5e7eb; }
        ::-webkit-scrollbar { display: none; }
        .mobile-container { width: 100%; max-width: 420px; height: 100dvh; margin: 0 auto; background-color: #f9fafb; display: flex; flex-direction: column; position: relative; overflow: hidden; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">

    <div class="mobile-container" id="appRoot">
        <div class="flex flex-col h-full justify-center items-center bg-indigo-600">
            <div class="text-white text-5xl mb-4 animate-bounce">🌙</div>
            <p class="text-white font-bold">서버와 연결 중입니다...</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
        import { getFirestore, doc, onSnapshot, setDoc } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

        // 대표님의 고유 열쇠
        const firebaseConfig = {
            apiKey: "AIzaSyDXE_Z9_ifIe5g3sdk2j5u5rMk_UAVoGJ0",
            authDomain: "dalkkumfutureapp.firebaseapp.com",
            projectId: "dalkkumfutureapp",
            storageBucket: "dalkkumfutureapp.firebasestorage.app",
            messagingSenderId: "683451719748",
            appId: "1:683451719748:web:176d2a6ea817857a579c11",
            measurementId: "G-9WXYK907XR"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const dbRef = doc(db, "dalkkum_app", "main_data"); 

        const allSubjects = [
            "생성형 AI 미디어 크리에이터", "코딩으로 만드는 나만의 AI 콘텐츠", "피지컬 인공지능 기기의 조작",
            "로봇작동의 원리", "휴머로이드 로봇의 운영", "자율주행자동차 라인트레이서",
            "AI 스마트 시티 시뮬레이터", "개인형 스마트 헬스케어", "스마트팜 기술",
            "XR과 AR기술의 융합", "게임 속 가상세계 탐험", "AI 레트로 게임 아케이드",
            "디지털 미디어 애니메이터", "드론으로 V라이브", "헬로메이플 AI 코딩"
        ];

        const defaultUsers = [{ id: 'admin', pw: '2744', name: '최고관리자', role: 'admin' }];
        
        window.users = []; 
        window.jobs = []; 
        window.applications = []; 
        
        window.currentUser = null; 
        window.currentView = 'login'; 
        window.tempRegData = { emailVerified: false, sentCode: "" };
        let isDataLoaded = false;

        // 🔥 실시간 데이터 동기화
        onSnapshot(dbRef, (docSnap) => {
            if (docSnap.exists()) {
                const data = docSnap.data();
                window.users = data.users || defaultUsers;
                window.jobs = data.jobs || [];
                window.applications = data.applications || [];
            } else {
                window.users = defaultUsers;
                window.saveDataToFirebase();
            }
            
            if(window.currentUser) {
                window.currentUser = window.users.find(u => u.id === window.currentUser.id);
            }

            isDataLoaded = true;
            if (window.renderApp) window.renderApp(); 
        });

        // 🔥 데이터 클라우드 저장
        window.saveDataToFirebase = function() {
            setDoc(dbRef, {
                users: window.users,
                jobs: window.jobs,
                applications: window.applications
            }).catch(error => {
                alert("데이터베이스 보안 규칙이 '테스트 모드'인지 꼭 확인해주세요!");
                console.error(error);
            });
        }

        // --- 화면 렌더링 로직 ---
        window.renderApp = function() {
            if (!isDataLoaded) return; 
            const root = document.getElementById('appRoot');

            if (currentView === 'login') {
                root.innerHTML = `
                    <div class="flex flex-col h-full px-6 py-12 justify-center bg-indigo-600 relative overflow-hidden">
                        <div class="absolute top-[-50px] right-[-50px] w-40 h-40 bg-white opacity-10 rounded-full blur-2xl"></div>
                        <div class="relative z-10 text-center mb-10">
                            <div class="text-white text-5xl mb-4">🌙</div>
                            <h1 class="text-3xl font-bold text-white tracking-tight">달꿈 Edu-Match</h1>
                        </div>
                        <div class="relative z-10 bg-white p-6 rounded-2xl shadow-xl">
                            <h2 class="text-lg font-bold text-gray-800 mb-6 text-center">초대된 사용자만 접속 가능합니다</h2>
                            <div class="space-y-4">
                                <div><label class="block text-xs font-bold text-gray-500 mb-1">아이디 (이름+휴대폰 뒤 4자리)</label><input type="text" id="loginId" class="w-full border-b-2 border-gray-200 px-2 py-2 focus:border-indigo-600 outline-none" placeholder="예: admin 또는 홍길동7890"></div>
                                <div><label class="block text-xs font-bold text-gray-500 mb-1">비밀번호</label><input type="password" id="loginPw" class="w-full border-b-2 border-gray-200 px-2 py-2 focus:border-indigo-600 outline-none" placeholder="비밀번호 입력"></div>
                            </div>
                            <button onclick="window.handleLogin()" class="w-full bg-indigo-600 text-white font-bold py-3 rounded-xl mt-8 hover:bg-indigo-700 shadow-md">로그인</button>
                            <div class="mt-6 text-center"><p class="text-xs text-gray-500">초대 코드가 있으신가요?</p><button onclick="window.changeView('register1')" class="text-sm font-bold text-indigo-600 mt-1 hover:underline">강사 회원가입</button></div>
                        </div>
                    </div>`;
                return;
            }

            if (currentView === 'register1') {
                root.innerHTML = `
                    <div class="flex flex-col h-full bg-white overflow-y-auto px-6 py-8">
                        <h2 class="text-2xl font-bold text-indigo-800 mb-2">회원가입 (1/2)</h2>
                        <div class="space-y-4">
                            <div><label class="block text-sm font-bold text-gray-700 mb-1">이름</label><input type="text" id="regName" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm" placeholder="실명 입력"></div>
                            <div>
                                <label class="block text-sm font-bold text-gray-700 mb-1">이메일 인증</label>
                                <div class="flex space-x-2"><input type="email" id="regEmail" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm" placeholder="이메일"><button onclick="window.sendVerificationCode()" class="bg-gray-200 px-3 py-2 rounded-lg text-sm font-bold whitespace-nowrap">전송</button></div>
                            </div>
                            <div id="verificationInputArea" class="hidden">
                                <div class="flex space-x-2"><input type="text" id="regEmailCode" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm" placeholder="인증번호"><button onclick="window.verifyEmailCode()" class="bg-indigo-100 text-indigo-700 px-3 py-2 rounded-lg text-sm font-bold">확인</button></div>
                                <p id="verificationMsg" class="text-xs mt-1 text-gray-500">인증번호를 입력해주세요.</p>
                            </div>
                            <div><label class="block text-sm font-bold text-gray-700 mb-1">전화번호</label><input type="tel" id="regPhone" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm" placeholder="010-0000-0000"></div>
                            <div><label class="block text-sm font-bold text-gray-700 mb-1">희망 비밀번호</label><input type="password" id="regPw" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm" placeholder="비밀번호 입력"></div>
                        </div>
                        <div class="flex space-x-3 mt-8 pb-8">
                            <button onclick="window.changeView('login')" class="w-1/3 bg-gray-200 font-bold py-3 rounded-xl">취소</button>
                            <button onclick="window.goToRegisterStep2()" class="w-2/3 bg-indigo-600 text-white font-bold py-3 rounded-xl">다음 ➔</button>
                        </div>
                    </div>`;
                return;
            }

            if (currentView === 'register2') {
                let subjectsHtml = allSubjects.map((sub, index) => `
                    <div class="border-b py-3">
                        <label class="flex items-center space-x-2 font-medium text-sm"><input type="checkbox" id="chk_sub_${index}" class="w-4 h-4 text-indigo-600"><span>${sub}</span></label>
                    </div>`).join('');
                root.innerHTML = `
                    <div class="flex flex-col h-full bg-white px-6 py-8">
                        <h2 class="text-2xl font-bold text-indigo-800 mb-2">회원가입 (2/2)</h2>
                        <div class="flex-1 overflow-y-auto border border-gray-200 rounded-lg p-3 mb-4 shadow-inner">${subjectsHtml}</div>
                        <div class="flex space-x-3 pb-4">
                            <button onclick="window.changeView('register1')" class="w-1/3 bg-gray-200 font-bold py-3 rounded-xl">이전</button>
                            <button onclick="window.submitRegistration()" class="w-2/3 bg-indigo-600 text-white font-bold py-3 rounded-xl">가입 완료</button>
                        </div>
                    </div>`;
                return;
            }

            let headerTitle = "🌙 달꿈 Edu-Match";
            let mainContent = "";

            if (currentUser.role === 'admin') {
                if(currentView === 'admin-jobs') {
                    headerTitle = "출강 공고 관리";
                    let jobsHtml = jobs.length === 0 ? `<div class="text-center text-gray-500 mt-20">등록된 공고가 없습니다.</div>` : jobs.map(j => `
                        <div class="bg-white rounded-xl shadow-sm border p-4 mb-4">
                            <div class="flex justify-between items-start mb-2">
                                <h3 class="font-bold text-indigo-800">${j.school}</h3>
                                ${j.isOpen ? `<span class="bg-green-100 text-green-800 text-[10px] font-bold px-2 py-1 rounded">오픈됨</span>` : `<button onclick="window.forceOpenJob(${j.id})" class="bg-red-500 text-white text-[10px] px-2 py-1 rounded">즉시오픈</button>`}
                            </div>
                            <p class="text-xs text-gray-500 mb-3">📅 ${j.date} | ⏰ ${j.time || '-'}</p>
                            <div class="bg-gray-50 p-2 rounded text-xs text-gray-700">
                                <ul class="list-disc list-inside space-y-1">${j.subjects.map(sub => `<li>${sub}</li>`).join('')}</ul>
                            </div>
                        </div>`).join('');
                    mainContent = `<div class="p-4 pb-20"><button onclick="window.changeView('admin-new-job')" class="w-full bg-indigo-600 text-white py-3 rounded-xl font-bold mb-4">+ 새 출강 공고 작성</button>${jobsHtml}</div>`;
                } else if(currentView === 'admin-new-job') {
                    headerTitle = "새 공고 작성";
                    mainContent = `
                        <div class="p-4 pb-24 space-y-3 bg-white min-h-full">
                            <div><label class="text-xs font-bold text-gray-600">일정</label><input type="text" id="jobDate" class="w-full border-b py-2 text-sm" placeholder="0월 0일(0요일)"></div>
                            <div><label class="text-xs font-bold text-gray-600">학교</label><input type="text" id="jobSchool" class="w-full border-b py-2 text-sm" placeholder="달꿈중학교"></div>
                            <div class="grid grid-cols-2 gap-3">
                                <div><label class="text-xs font-bold text-gray-600">대상</label><input type="text" id="jobTarget" class="w-full border-b py-2 text-sm" placeholder="1학년"></div>
                                <div><label class="text-xs font-bold text-gray-600">강사료</label><input type="text" id="jobFee" class="w-full border-b py-2 text-sm" placeholder="12만원"></div>
                            </div>
                            <div><label class="text-xs font-bold text-gray-600">시간표</label><input type="text" id="jobTime" class="w-full border-b py-2 text-sm" placeholder="11:00~12:00"></div>
                            <div class="pt-4 border-t"><label class="text-sm font-bold block mb-2">모집 수업</label><div id="jobSubjectsContainer" class="space-y-2 mb-3"></div><button onclick="window.addSubjectField()" class="w-full bg-indigo-50 text-indigo-600 py-2 rounded-lg text-sm font-bold">+ 수업 칸 추가</button></div>
                            <div class="flex gap-2 mt-6"><button onclick="window.changeView('admin-jobs')" class="w-1/3 bg-gray-200 py-3 rounded-xl font-bold text-sm">취소</button><button onclick="window.submitNewJob()" class="w-2/3 bg-indigo-600 text-white py-3 rounded-xl font-bold text-sm">등록</button></div>
                        </div>`;
                    setTimeout(() => { if(document.getElementById('jobSubjectsContainer') && document.getElementById('jobSubjectsContainer').children.length === 0) window.addSubjectField(); }, 0);
                } else if(currentView === 'admin-apps') {
                    headerTitle = "지원자 현황";
                    let appHtml = applications.length === 0 ? `<div class="text-center text-gray-500 mt-20">지원자가 없습니다.</div>` : '';
                    jobs.forEach(j => {
                        let jobApps = applications.filter(a => a.jobId === j.id);
                        if (jobApps.length > 0) {
                            appHtml += `<div class="bg-white rounded-xl shadow border p-4 mb-5"><h3 class="font-bold text-indigo-800 text-sm mb-2">${j.school}</h3><div class="space-y-3">
                                ${jobApps.map(a => `
                                    <div class="bg-gray-50 p-3 rounded-lg border">
                                        <div class="flex justify-between mb-1"><span class="font-bold text-sm">${a.instructorId}</span><span class="font-bold text-[10px]">${a.status}</span></div>
                                        <p class="text-xs mb-2">${a.subjectIndex + 1}번. ${a.subjectName}</p>
                                        <div class="flex space-x-2"><button onclick="window.manageApplication(${a.appId}, '수락')" class="flex-1 bg-blue-500 text-white py-1 rounded text-xs font-bold">수락</button><button onclick="window.manageApplication(${a.appId}, '반려')" class="flex-1 bg-red-500 text-white py-1 rounded text-xs font-bold">반려</button></div>
                                    </div>
                                `).join('')}</div></div>`;
                        }
                    });
                    mainContent = `<div class="p-4 pb-20">${appHtml}</div>`;
                } else if(currentView === 'admin-inst') {
                    headerTitle = "강사 관리";
                    let instHtml = users.filter(u => u.role === 'instructor').map(instructor => {
                        let subCards = instructor.subjects.map((sub) => `
                            <div class="bg-gray-50 p-2 rounded mb-2">
                                <div class="flex justify-between mb-2"><p class="text-xs font-bold flex-1">${sub.name}</p><span class="text-[10px] font-bold px-2">${sub.status}</span></div>
                                <p class="text-[10px] text-gray-500 mb-2">사유: ${sub.reason || '없음'}</p>
                                <div class="flex space-x-1 justify-end"><button onclick="window.updateInstSubStatus('${instructor.id}', '${sub.name}', '승인')" class="bg-blue-500 text-white px-2 py-1 text-[10px] rounded font-bold">승인</button><button onclick="window.updateInstSubStatus('${instructor.id}', '${sub.name}', '반려')" class="bg-red-500 text-white px-2 py-1 text-[10px] rounded font-bold">반려</button></div>
                            </div>`).join('');
                        return `<div class="bg-white rounded-xl shadow border p-4 mb-4"><h3 class="font-bold text-lg mb-2">${instructor.name} (${instructor.id})</h3><div class="border-t pt-2">${subCards}</div></div>`;
                    }).join('');
                    mainContent = `<div class="p-4 pb-20">${instHtml}</div>`;
                }

            } else { // 강사 화면
                if(currentView === 'inst-jobs') {
                    headerTitle = "출강 공고";
                    let jobsHtml = jobs.length === 0 ? `<div class="text-center text-gray-500 mt-20">공고가 없습니다.</div>` : jobs.map(j => {
                        if(!j.isOpen) return `<div class="bg-white rounded-xl shadow border p-4 mb-4 opacity-60"><h3 class="font-bold">${j.school} (오픈대기)</h3></div>`;
                        let subjectsList = j.subjects.map((sub, index) => {
                            let myApp = applications.find(a => a.jobId === j.id && a.instructorId === currentUser.id && a.subjectIndex === index);
                            let isApproved = currentUser.subjects.some(userSub => userSub.name === sub && userSub.status === '승인');
                            if (myApp) return `<div class="flex justify-between items-center bg-gray-50 p-2 rounded mb-2"><span class="text-xs font-medium w-2/3 truncate">${index + 1}. ${sub}</span><span class="text-[10px] font-bold">${myApp.status}됨</span></div>`;
                            else if (isApproved) return `<div class="flex justify-between items-center bg-gray-50 p-2 rounded mb-2 border border-indigo-100"><span class="text-xs font-medium w-2/3 truncate">${index + 1}. ${sub}</span><button onclick="window.applyForSubject(${j.id}, '${sub}', ${index})" class="bg-indigo-600 text-white text-[10px] px-3 py-1 rounded font-bold">지원</button></div>`;
                            else return `<div class="flex justify-between items-center bg-gray-50 p-2 rounded mb-2 opacity-50"><span class="text-xs text-gray-600 w-2/3 truncate">${index + 1}. ${sub}</span><span class="text-[10px]">자격없음</span></div>`;
                        }).join('');
                        return `<div class="bg-white rounded-xl shadow border border-indigo-100 p-4 mb-4"><h3 class="font-bold text-indigo-800">${j.school}</h3><p class="text-[11px] text-gray-500 mb-3">📅 ${j.date} | 💰 ${j.fee}</p><div>${subjectsList}</div></div>`;
                    }).join('');
                    mainContent = `<div class="p-4 pb-20">${jobsHtml}</div>`;
                } else if(currentView === 'inst-sched') {
                    headerTitle = "내 출강 일정";
                    let myApps = applications.filter(a => a.instructorId === currentUser.id);
                    let schedHtml = myApps.length === 0 ? `<div class="text-center text-gray-500 mt-20">지원한 일정이 없습니다.</div>` : myApps.map(a => {
                        let job = jobs.find(j => j.id === a.jobId);
                        return `<div class="bg-white p-4 rounded-xl shadow border mb-3"><div class="flex justify-between"><h3 class="font-bold text-sm">${job ? job.school : '-'}</h3><span class="text-[10px] font-bold bg-gray-200 px-2 py-1 rounded">${a.status}</span></div><p class="text-[11px] text-gray-500 mt-1">${job ? job.date : '-'}</p><div class="text-xs font-bold text-indigo-600 mt-2">${a.subjectIndex + 1}번: ${a.subjectName}</div></div>`;
                    }).join('');
                    mainContent = `<div class="p-4 pb-20">${schedHtml}</div>`;
                } else if(currentView === 'inst-prof') {
                    headerTitle = "내 프로필";
                    let mySubjectNames = currentUser.subjects.map(s => s.name);
                    let mySubjectsHtml = currentUser.subjects.length === 0 ? `<p class="text-xs text-gray-500 py-2">없음</p>` : currentUser.subjects.map(sub => `<div class="flex justify-between border-b py-2"><span class="text-xs w-2/3 truncate">${sub.name}</span><span class="text-[10px] font-bold">${sub.status}</span></div>`).join('');
                    let unappliedSubjects = allSubjects.filter(sub => !mySubjectNames.includes(sub));
                    let unappliedHtml = unappliedSubjects.map(sub => `<div class="flex justify-between border-b py-2"><span class="text-[11px] text-gray-500 w-2/3 truncate">${sub}</span><button onclick="window.requestNewSubject('${sub}')" class="border border-indigo-300 text-indigo-600 text-[10px] font-bold px-2 py-1 rounded">+ 신청</button></div>`).join('');
                    mainContent = `<div class="p-4 pb-20"><div class="bg-white rounded-xl shadow p-5 mb-4"><h3 class="font-bold">${currentUser.name} (${currentUser.id})</h3></div><div class="bg-white rounded-xl shadow p-5 mb-4"><h3 class="text-sm font-bold border-b pb-2">내 강의 자격</h3>${mySubjectsHtml}</div><div class="bg-gray-50 rounded-xl shadow border p-5"><h3 class="text-sm font-bold border-b pb-2">추가 자격 신청</h3>${unappliedHtml}</div></div>`;
                }
            }

            let navBar = `<nav class="bg-white border-t border-gray-200 flex justify-around pb-6 pt-2 absolute bottom-0 w-full z-50">`;
            if(currentUser.role === 'admin') {
                navBar += `
                    <button onclick="window.changeView('admin-jobs')" class="flex flex-col items-center ${currentView.includes('job') ? 'text-indigo-600' : 'text-gray-400'} p-2 w-1/3"><span class="text-xl">📅</span><span class="text-[10px] font-bold mt-1">공고관리</span></button>
                    <button onclick="window.changeView('admin-apps')" class="flex flex-col items-center ${currentView === 'admin-apps' ? 'text-indigo-600' : 'text-gray-400'} p-2 w-1/3"><span class="text-xl">✅</span><span class="text-[10px] font-bold mt-1">지원현황</span></button>
                    <button onclick="window.changeView('admin-inst')" class="flex flex-col items-center ${currentView === 'admin-inst' ? 'text-indigo-600' : 'text-gray-400'} p-2 w-1/3"><span class="text-xl">👥</span><span class="text-[10px] font-bold mt-1">강사관리</span></button>`;
            } else {
                navBar += `
                    <button onclick="window.changeView('inst-jobs')" class="flex flex-col items-center ${currentView === 'inst-jobs' ? 'text-indigo-600' : 'text-gray-400'} p-2 w-1/3"><span class="text-xl">📅</span><span class="text-[10px] font-bold mt-1">출강공고</span></button>
                    <button onclick="window.changeView('inst-sched')" class="flex flex-col items-center ${currentView === 'inst-sched' ? 'text-indigo-600' : 'text-gray-400'} p-2 w-1/3"><span class="text-xl">📋</span><span class="text-[10px] font-bold mt-1">내일정</span></button>
                    <button onclick="window.changeView('inst-prof')" class="flex flex-col items-center ${currentView === 'inst-prof' ? 'text-indigo-600' : 'text-gray-400'} p-2 w-1/3"><span class="text-xl">👤</span><span class="text-[10px] font-bold mt-1">프로필</span></button>`;
            }
            navBar += `</nav>`;

            root.innerHTML = `
                <header class="bg-indigo-600 text-white p-4 shadow-md flex justify-between items-center z-50 shrink-0">
                    <h1 class="font-bold text-lg">${headerTitle}</h1>
                    <button onclick="window.handleLogout()" class="text-xs bg-indigo-500 px-3 py-1.5 rounded-full font-bold">로그아웃</button>
                </header>
                <main class="flex-1 overflow-y-auto bg-gray-100 relative">${mainContent}</main>
                ${navBar}`;
        };

        // --- 4. 동작 함수들 (클라우드 데이터 저장과 연결됨) ---
        window.changeView = function(v) { currentView = v; window.renderApp(); }
        window.goHome = function() { if(!currentUser) changeView('login'); else if(currentUser.role === 'admin') changeView('admin-jobs'); else changeView('inst-jobs'); }
        window.handleLogin = function() { const id = document.getElementById('loginId').value; const pw = document.getElementById('loginPw').value; const user = users.find(u => u.id === id && u.pw === pw); if (user) { currentUser = user; window.goHome(); } else { alert('아이디/비밀번호 오류입니다.'); } }
        window.handleLogout = function() { currentUser = null; changeView('login'); }

        window.sendVerificationCode = function() { const email = document.getElementById('regEmail').value; if(!email) return; tempRegData.sentCode = Math.floor(100000 + Math.random() * 900000).toString(); alert(`[달꿈] 테스트 인증번호: ${tempRegData.sentCode}`); document.getElementById('verificationInputArea').classList.remove('hidden'); }
        window.verifyEmailCode = function() { if(document.getElementById('regEmailCode').value === tempRegData.sentCode) { tempRegData.emailVerified = true; document.getElementById('verificationMsg').innerText = "✅ 인증성공"; document.getElementById('verificationMsg').className="text-xs mt-1 text-green-600 font-bold"; } else alert("불일치"); }
        window.goToRegisterStep2 = function() { const name = document.getElementById('regName').value, pw = document.getElementById('regPw').value, phone = document.getElementById('regPhone').value; if(!name||!pw||!phone||!tempRegData.emailVerified) return alert("입력 오류 또는 미인증"); const digitsOnly = phone.replace(/[^0-9]/g, ''); tempRegData.name = name; tempRegData.pw = pw; tempRegData.phone = phone; tempRegData.last4 = digitsOnly.slice(-4); changeView('register2'); }
        
        window.submitRegistration = function() {
            let sel = []; allSubjects.forEach((sub, i) => { if(document.getElementById(`chk_sub_${i}`).checked) sel.push({ name: sub, status: '대기', reason: '가입시 선택' }); });
            if(sel.length===0) return alert("최소 1개 수업 선택 필수");
            const fid = tempRegData.name + tempRegData.last4;
            users.push({ id: fid, pw: tempRegData.pw, name: tempRegData.name, phone: tempRegData.phone, role: 'instructor', subjects: sel });
            window.saveDataToFirebase();
            alert(`가입 완료!\nID: ${fid}`); changeView('login');
        }

        window.addSubjectField = function() { const c = document.getElementById('jobSubjectsContainer'); const div = document.createElement('div'); div.className = "flex space-x-2"; let opt = allSubjects.map(sub => `<option value="${sub}">${sub}</option>`).join(''); div.innerHTML = `<select class="flex-1 border p-2 text-sm job-subject-select">${opt}</select><button onclick="this.parentElement.remove()" class="text-red-500 bg-red-50 px-3 font-bold rounded">X</button>`; c.appendChild(div); }
        
        window.submitNewJob = function() {
            const date = document.getElementById('jobDate').value, school = document.getElementById('jobSchool').value, target = document.getElementById('jobTarget').value, fee = document.getElementById('jobFee').value, time = document.getElementById('jobTime').value;
            const subs = Array.from(document.querySelectorAll('.job-subject-select')).map(s => s.value);
            if(!date || !school || subs.length===0) return alert("필수항목 누락");
            jobs.push({ id: Date.now(), date, school, target, fee, time, subjects: subs, isOpen: false });
            window.saveDataToFirebase();
            alert('등록 완료!'); changeView('admin-jobs');
        }

        window.forceOpenJob = function(id) { let j = jobs.find(x => x.id === id); if(j) { j.isOpen = true; window.saveDataToFirebase(); } }
        window.manageApplication = function(id, st) { let a = applications.find(x => x.appId === id); if(a) { a.status = st; window.saveDataToFirebase(); } }
        window.applyForSubject = function(jId, sN, sIdx) { applications.push({ appId: Date.now(), jobId: jId, instructorId: currentUser.id, subjectName: sN, subjectIndex: sIdx, status: '대기' }); window.saveDataToFirebase(); alert('지원 완료!'); }
        window.updateInstSubStatus = function(iId, sN, st) { let ins = users.find(u => u.id === iId); if(ins) { let s = ins.subjects.find(x => x.name === sN); if(s) { s.status = st; window.saveDataToFirebase(); } } }
        window.requestNewSubject = function(sN) { let r = prompt(`[${sN}] 신청 사유:`); if(r && r.trim()!=='') { currentUser.subjects.push({ name: sN, status: '대기', reason: r }); window.saveDataToFirebase(); alert('신청 완료!'); } }

    </script>
</body>
</html>
